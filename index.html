<title>Защищённый документ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#fff;border-radius:16px;padding:48px;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:center;max-width:380px;width:90%%}
.lock{font-size:48px;margin-bottom:16px}
h2{color:#1e293b;margin-bottom:8px;font-size:20px}
p{color:#64748b;margin-bottom:24px;font-size:14px}
input{width:100%%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:10px;font-size:16px;outline:none;transition:border .2s}
input:focus{border-color:#2563eb}
button{width:100%%;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;margin-top:12px;transition:background .2s}
button:hover{background:#1d4ed8}
.err{color:#ef4444;margin-top:12px;font-size:14px;display:none}
</style>

document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")go()});
async function go(){
  const pw=document.getElementById("pw").value;
  try{
    const enc=new TextEncoder;
    const saltBuf=Uint8Array.from(atob(SALT),c=>c.charCodeAt(0));
    const ivBuf=Uint8Array.from(atob(IV),c=>c.charCodeAt(0));
    const ctBuf=Uint8Array.from(atob(CT),c=>c.charCodeAt(0));
    const keyMaterial=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveBits","deriveKey"]);
    const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:saltBuf,iterations:100000,hash:"SHA-256"},keyMaterial,{name:"AES-GCM",length:256},false,["decrypt"]);
    const dec=await crypto.subtle.decrypt({name:"AES-GCM",iv:ivBuf},key,ctBuf);
    const html=new TextDecoder().decode(dec);
    const parser=new DOMParser();
    const newDoc=parser.parseFromString(html,"text/html");
    const fontLink=document.createElement("link");
    fontLink.rel="stylesheet";
    fontLink.href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap";
    newDoc.head.insertBefore(fontLink,newDoc.head.firstChild);
    const pc=document.createElement("link");pc.rel="preconnect";pc.href="https://fonts.googleapis.com";
    newDoc.head.insertBefore(pc,newDoc.head.firstChild);
    const pg=document.createElement("link");pg.rel="preconnect";pg.href="https://fonts.gstatic.com";pg.crossOrigin="anonymous";
    newDoc.head.insertBefore(pg,pc.nextSibling);
    document.open();
    document.write(newDoc.documentElement.outerHTML);
    document.close();
  }catch(e){document.getElementById("err").style.display="block"}
}
</script>
